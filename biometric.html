<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Verification</title>

    <link rel="stylesheet" href="style.css">
    <script src="notifications.js"></script>

    <style>
        .scanner-container {
            width: 100%;
            max-width: 400px;
            height: 300px;
            background: #0f172a;
            margin: 20px auto;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 4px solid var(--border);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror effect */
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        .scan-line {
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, var(--primary), transparent);
            position: absolute;
            top: 0;
            box-shadow: 0 0 15px var(--primary);
            animation: scanMove 3s infinite linear;
        }

        .face-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(160px, 60%, 220px);
            height: clamp(200px, 80%, 280px);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 50% / 40%;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4);
        }

        @media (max-width: 480px) {
            .scanner-container {
                height: 250px;
            }
        }

        .scan-status {
            text-align: center;
            margin-top: 20px;
        }

        .timer-circle {
            width: 80px;
            height: 80px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes scanMove {
            0% {
                top: 0;
            }

            50% {
                top: 100%;
            }

            100% {
                top: 0;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .success-icon {
            font-size: 50px;
            color: var(--success);
            display: none;
            margin-bottom: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>

    <!-- Load maintained face-api.js fork from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <script>
        const translations = {
            en: {
                title: "Biometric Face Scan",
                subtitle: "Position your face within the guide and wait for the scanner.",
                scanning: "Scanning face... Please stay still",
                verified: "Verification Successful",
                confirmed: "Your identity has been confirmed against government records.",
                proceedBtn: "Proceed Next",
                notifSuccess: "Face verification successful!",
                loadingModels: "Initializing AI... Please wait",
                faceNotFound: "Face not detected. Please adjust your position.",
                matchError: "Face mismatch! Identity could not be verified.",
                cameraError: "Error accessing camera. Please check permissions."
            },
            ta: {
                title: "பயோமெட்ரிக் முக ஸ்கேன்",
                subtitle: "உங்கள் முகத்தை வழிகாட்டிக்குள் வைத்து, ஸ்கேனருக்காக காத்திருக்கவும்.",
                scanning: "முகத்தை ஸ்கேன் செய்கிறது... தயவுசெய்து அசையாமல் இருக்கவும்",
                verified: "சரிபார்ப்பு வெற்றிகரமாக முடிந்தது",
                confirmed: "அரசு ஆவணங்களுடன் உங்கள் அடையாளம் உறுதிப்படுத்தப்பட்டுள்ளது.",
                proceedBtn: "அடுத்து தொடரவும்",
                notifSuccess: "முகச் சரிபார்ப்பு வெற்றிகரமாக முடிந்தது!",
                loadingModels: "AI-ஐத் தொடங்குகிறது... தயவுசெய்து காத்திருக்கவும்",
                faceNotFound: "முகம் கண்டறியப்படவில்லை. தயவுசெய்து உங்கள் நிலையைச் சரிசெய்யவும்.",
                matchError: "முகம் பொருந்தவில்லை! அடையாளத்தை உறுதிப்படுத்த முடியவில்லை.",
                cameraError: "கேமராவை அணுகுவதில் பிழை. அனுமதிகளைச் சரிபார்க்கவும்."
            }
        };

        const currentLang = localStorage.getItem('appLanguage') || 'en';
        // Using vladmandic models which are more reliable
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        const REFERENCE_IMAGES = ['ranjit.jpeg', 'ambalavanan.webp'];

        let faceMatcher = null;
        let isVerificationComplete = false;

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('t-title').textContent = t.title;
            document.getElementById('t-subtitle').textContent = t.subtitle;
            document.getElementById('t-scanning').textContent = t.loadingModels;
            document.getElementById('t-verified').textContent = t.verified;
            document.getElementById('t-confirmed').textContent = t.confirmed;
            document.getElementById('t-proceed-btn').textContent = t.proceedBtn;
        }

        window.onload = async function () {
            updateUI();
            try {
                // Check for secure context only if definitively false
                if (window.isSecureContext === false) {
                    throw new Error("SECURE_CONTEXT_REQUIRED");
                }

                await startCamera();

                try {
                    await loadModels();
                } catch (loadErr) {
                    console.error("Model Loading Error:", loadErr);
                    const modelErrMsg = currentLang === 'ta' ?
                        "AI மாதிரிகளை ஏற்ற முடியவில்லை. இன்டர்நெட் இணைப்பைச் சரிபார்க்கவும்." :
                        "Could not load AI models. Please check your internet connection and reload.";
                    showNotification(modelErrMsg, "error", 15000);
                    return; // Stop here
                }

                await prepareReferenceFace();
                startVerificationLoop();

            } catch (err) {
                console.error("Initialization Error:", err);
                let errorMessage = currentLang === 'ta' ? "தொடக்கத்தில் பிழை ஏற்பட்டது." : "Initialization error occurred.";

                if (err.message === "SECURE_CONTEXT_REQUIRED") {
                    errorMessage = currentLang === 'ta' ?
                        "பாதுகாப்பான இணைப்பு (HTTPS/Localhost) தேவை. தயவுசெய்து சரிபார்க்கவும்." :
                        "Secure context (HTTPS or localhost) is required for camera access.";
                } else if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
                    errorMessage = currentLang === 'ta' ?
                        "கேமரா அனுமதி மறுக்கப்பட்டது. பிரவுசர் செட்டிங்ஸில் அனுமதிக்கவும்." :
                        "Camera permission denied. Please allow it in browser settings.";
                } else if (err.name === "NotFoundError" || err.name === "DevicesNotFoundError") {
                    errorMessage = currentLang === 'ta' ?
                        "கேமரா கிடைக்கவில்லை. இணைப்பைச் சரிபார்க்கவும்." :
                        "No camera found. Please check your hardware connection.";
                } else {
                    // Fallback to generic camera error if it's likely camera related but not caught above
                    errorMessage = translations[currentLang].cameraError;
                }

                showNotification(errorMessage, "error", 10000);
            }
        };

        async function startCamera() {
            const video = document.getElementById('video-feed');
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error("MediaDevices API not supported");
            }
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" }
            });
            video.srcObject = stream;
        }

        async function loadModels() {
            console.log("Loading models from:", MODEL_URL);
            try {
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                console.log("All models loaded successfully");
            } catch (e) {
                console.error("Critical error during model loading:", e);
                throw e;
            }
        }

        async function prepareReferenceFace() {
            console.log("Processing reference images:", REFERENCE_IMAGES);
            try {
                const labeledDescriptors = [];

                for (const imagePath of REFERENCE_IMAGES) {
                    console.log(`Processing: ${imagePath}`);
                    const img = await faceapi.fetchImage(imagePath);

                    // Try SSD Mobilenet V1 first (more accurate)
                    let detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();

                    if (!detections) {
                        console.warn(`SSD detector failed for ${imagePath}. Trying TinyFaceDetector...`);
                        // Try Tiny Face Detector as fallback
                        detections = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                    }

                    if (detections) {
                        // Create a label from the filename (e.g., "ranjit")
                        const label = imagePath.split('.')[0];
                        labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(label, [detections.descriptor]));
                        console.log(`Successfully processed: ${imagePath} as ${label}`);
                    } else {
                        console.error(`FAILED to find face in: ${imagePath}`);
                    }
                }

                if (labeledDescriptors.length === 0) {
                    console.error("CRITICAL: All face detectors failed for ALL reference images.");
                    showNotification("Reference identity error. Please contact support.", "error", 15000);
                    return;
                }

                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors);
                console.log(`Reference identities verified. Loaded ${labeledDescriptors.length} descriptors.`);
            } catch (err) {
                console.error("Reference image processing error:", err);
                showNotification("Could not process reference identity.", "error");
            }
        }

        async function startVerificationLoop() {
            const video = document.getElementById('video-feed');
            const statusLabel = document.getElementById('t-scanning');
            const t = translations[currentLang];

            statusLabel.textContent = t.scanning;

            const interval = setInterval(async () => {
                if (isVerificationComplete) {
                    clearInterval(interval);
                    return;
                }

                const detections = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();

                if (detections) {
                    // Update status to show we see A face
                    const matchingText = currentLang === 'ta' ? "சரிபார்க்கிறது..." : "Matching face...";
                    statusLabel.textContent = matchingText;
                    statusLabel.style.color = "var(--primary)";

                    const match = faceMatcher.findBestMatch(detections.descriptor);
                    console.log("Match Result:", match.toString());

                    // Standard threshold is 0.6. Using it to be less restrictive.
                    if (match.label !== 'unknown' && match.distance < 0.6) {
                        isVerificationComplete = true;
                        completeVerification();
                    }
                } else {
                    // Reset to scanning if no face seen
                    statusLabel.textContent = t.scanning;
                    statusLabel.style.color = "var(--text-muted)";
                }
            }, 500);
        }

        function completeVerification() {
            const t = translations[currentLang];
            document.getElementById('scanning-ui').style.display = 'none';
            document.getElementById('success-ui').style.display = 'block';
            document.getElementById('success-icon').style.display = 'block';

            showNotification(t.notifSuccess, "success");
        }

        function proceedToNext() {
            window.location.href = "blockchaincontract.html";
        }
    </script>
</head>

<body>

    <div class="card" style="max-width: 500px; text-align: center;">
        <h3 id="t-title">Biometric Face Scan</h3>
        <p id="t-subtitle">Position your face within the guide and wait for the scanner.</p>

        <div class="scanner-container">
            <video id="video-feed" autoplay playsinline muted></video>
            <div class="scan-overlay">
                <div class="scan-line"></div>
                <div class="face-guide"></div>
            </div>
        </div>

        <div id="scanning-ui" class="scan-status">
            <p id="t-scanning" style="font-weight: 600; color: var(--text-muted);">Scanning face... Please stay still
            </p>
        </div>

        <div id="success-ui" class="scan-status" style="display: none;">
            <div id="success-icon" class="success-icon">✅</div>
            <h4 id="t-verified" style="color: var(--success); margin-bottom: 8px;">Verification Successful</h4>
            <p id="t-confirmed" style="margin-bottom: 24px;">Your identity has been confirmed against government
                records.</p>
            <button id="t-proceed-btn" class="btn-success" onclick="proceedToNext()" style="width: 100%;">Proceed
                Next</button>
        </div>
    </div>

</body>

</html>
